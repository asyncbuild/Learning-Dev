<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Todo App</title>
</head>
<body>
    <h1>My Simple Todo List</h1>
    
    <!-- Step 1: An input box for you to type in -->
    <input type="text" id="todoInput" placeholder="What needs to be done?">
    
    <!-- Step 2: A button to click to add the item -->
    <button onclick="addTodo()">Add Item</button>

    <hr>
    
    <!-- Step 3: A space where our todos will be displayed -->
    <div id="todoList"></div>

    <!-- Step 4: Link to our logic (the JavaScript file) -->
    <script src="script.js"></script>
</body>
</html>
